<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Monitoramento Florestal</title>
  
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-app: #f8fafc;
      --bg-card: #ffffff;
      
      --text-main: #0f172a;
      --text-muted: #475569;
      --text-subtle: #94a3b8;
      
      --color-primary: #4f46e5;
      --color-primary-hover: #4338ca;
      
      --color-success: #10b981;
      --color-danger: #ef4444;
      --color-danger-light: #fee2e2;
      
      --border-color: #e2e8f0;
      --border-focus: #4f46e5;
      
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;
      --font-heading: 'Outfit', system-ui, -apple-system, sans-serif;
      
      --shadow-lg: 0 10px 25px -3px rgba(15, 23, 42, 0.08), 0 4px 6px -2px rgba(15, 23, 42, 0.03);
      --shadow-indigo: 0 4px 14px 0 rgba(79, 70, 229, 0.2);
    }

    body {
      background-color: var(--bg-app);
      color: var(--text-main);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }

    .login-container {
      width: 100%;
      max-width: 440px;
      animation: fade-in 0.5s ease-out;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 2rem;
      gap: 0.75rem;
    }

    .brand-icon {
      background: linear-gradient(135deg, var(--color-primary), #818cf8);
      color: white;
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-indigo);
      margin-bottom: 0.5rem;
    }

    .brand-title {
      font-family: var(--font-heading);
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .brand-subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: var(--shadow-lg);
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-subtle);
      pointer-events: none;
      transition: color 0.15s ease;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--text-main);
      background-color: var(--bg-card);
      transition: all 0.15s ease;
    }

    input::placeholder {
      color: var(--text-subtle);
    }

    input:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    input:focus + .input-icon {
      color: var(--color-primary);
    }

    .btn-submit {
      background-color: var(--color-primary);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.875rem;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow-indigo);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: background-color 0.15s ease, transform 0.1s ease;
    }

    .btn-submit:hover {
      background-color: var(--color-primary-hover);
    }

    .btn-submit:active {
      transform: scale(0.98);
    }

    .btn-submit:disabled {
      background-color: var(--text-subtle);
      box-shadow: none;
      cursor: not-allowed;
    }

    /* ERROR BOX */
    .error-box {
      background-color: var(--color-danger-light);
      color: #991b1b;
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    /* ANIMATIONS */
    .animate-spin {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="brand-header">
      <div class="brand-icon">
        <i data-lucide="shield-check" size="28"></i>
      </div>
      <h1 class="brand-title">Controle Florestal</h1>
      <p class="brand-subtitle">Identificação automática de comprovantes</p>
    </div>

    <div class="card">
      <div id="errorBox" class="error-box">
        <i data-lucide="alert-circle" size="18"></i>
        <span id="errorMessage">Credenciais inválidas.</span>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">E-mail</label>
          <div class="input-wrapper">
            <input type="email" id="email" placeholder="nome@empresa.com" required autocomplete="username">
            <i data-lucide="mail" class="input-icon" size="18"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="Sua senha" required autocomplete="current-password">
            <i data-lucide="lock" class="input-icon" size="18"></i>
          </div>
        </div>

        <button type="submit" id="btnSubmit" class="btn-submit">
          <span>Entrar no Painel</span>
          <i data-lucide="arrow-right" size="18"></i>
        </button>
      </form>
    </div>
  </div>

  <script>
    // Supabase Configuration
    const SUPABASE_URL = "https://idtykrzfbtagcfifbtic.supabase.co";
    const SUPABASE_KEY = "sb_publishable_i0Mb32Wkmi_lYqEnQWsNOw_ufCpM9O3";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const btnSubmit = document.getElementById('btnSubmit');
    const errorBox = document.getElementById('errorBox');
    const errorMessage = document.getElementById('errorMessage');

    // INIT
    window.addEventListener('DOMContentLoaded', async () => {
      lucide.createIcons();
      
      // Check if user is already authenticated
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        window.location.href = 'index.html';
      }
    });

    // SUBMIT HANDLER
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Clear error state
      hideError();
      setLoading(true);

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;

        // Login success, redirect
        window.location.href = 'index.html';
      } catch (err) {
        console.error("Login error:", err);
        showError(translateError(err.message));
        setLoading(false);
      }
    });

    // UTILITIES
    function setLoading(isLoading) {
      if (isLoading) {
        btnSubmit.disabled = true;
        btnSubmit.innerHTML = `
          <i data-lucide="loader-2" class="animate-spin" size="18"></i>
          <span>Autenticando...</span>
        `;
      } else {
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = `
          <span>Entrar no Painel</span>
          <i data-lucide="arrow-right" size="18"></i>
        `;
      }
      lucide.createIcons();
    }

    function showError(msg) {
      errorMessage.textContent = msg;
      errorBox.style.display = 'flex';
    }

    function hideError() {
      errorBox.style.display = 'none';
    }

    function translateError(msg) {
      if (msg.toLowerCase().includes("invalid login credentials")) {
        return "E-mail ou senha incorretos. Por favor, tente novamente.";
      }
      if (msg.toLowerCase().includes("email not confirmed")) {
        return "Este e-mail ainda não foi confirmado no Supabase.";
      }
      return msg;
    }
  </script>
</body>
</html>
